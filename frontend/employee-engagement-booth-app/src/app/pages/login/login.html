<div class="login-container">
  <h1>Employee Engagement Booth</h1>

  <div class="mode-toggle">
    <button [class.active]="mode === 'register'" (click)="mode = 'register'; errorMessage = ''">Register</button>
    <button [class.active]="mode === 'resume'" (click)="mode = 'resume'; errorMessage = ''">Resume Session</button>
  </div>

  <div *ngIf="mode === 'register'" class="form-section">
    <input [(ngModel)]="name" placeholder="Enter your name" />
    <button (click)="register()">Register</button>
  </div>

  <div *ngIf="mode === 'resume'" class="form-section">
    <input [(ngModel)]="userId" placeholder="Enter your QR code / ID" />
    <button (click)="resume()">Resume</button>
  </div>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
</div>
