<div class="leaderboard-container">
  <div class="lb-header">
    <p class="eyebrow">Live standings</p>
    <h1>Leaderboard</h1>
  </div>

  <p class="status" *ngIf="!connected">Connecting…</p>

  <div class="standings" *ngIf="standings.length > 0">
    <div
      class="row"
      *ngFor="let user of standings; let i = index"
      [class.rank-1]="i === 0"
      [class.rank-2]="i === 1"
      [class.rank-3]="i === 2"
    >
      <span class="rank">
        <ng-container [ngSwitch]="i">
          <span *ngSwitchCase="0">🥇</span>
          <span *ngSwitchCase="1">🥈</span>
          <span *ngSwitchCase="2">🥉</span>
          <span *ngSwitchDefault>#{{ i + 1 }}</span>
        </ng-container>
      </span>
      <span class="name">{{ user.name }}</span>
      <span class="score">{{ user.score }} <small>pts</small></span>
    </div>
  </div>

  <p class="empty" *ngIf="connected && standings.length === 0">
    No scores yet — be the first!
  </p>
</div>
