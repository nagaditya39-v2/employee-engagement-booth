<div class="menu-container">
  <h2>Welcome! Choose a topic to explore.</h2>

  <div class="launch-bar" *ngIf="!contentWindow || contentWindow.closed">
    <button (click)="launchContentWindow()">🖥 Launch Display Window</button>
  </div>

  <div class="content-grid">
    <div
      class="content-card"
      *ngFor="let item of contentItems"
    >
      <div class="card-type">{{ item.content_type }}</div>
      <h3>{{ item.title }}</h3>
      <div class="card-status">{{ getStatusLabel(item.id) }}</div>

      <button
        *ngIf="!progressMap[item.id] || progressMap[item.id] === 'not_started'"
        (click)="openContent(item)"
      >
        View Content
      </button>

      <button
        *ngIf="progressMap[item.id] === 'viewed'"
        (click)="startQuiz(item)"
      >
        📝 Start Quiz
      </button>

      <ng-container *ngIf="progressMap[item.id] === 'quiz_assigned'">
        <span class="quiz-in-progress">Quiz in progress — resume below</span>
        <button (click)="startQuiz(item)">Resume Quiz</button>
      </ng-container>
    </div>
  </div>
</div>
