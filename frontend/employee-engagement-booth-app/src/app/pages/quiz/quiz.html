
<div class="quiz-page">
  <div class="quiz-container">
    <div class="stats">
      <div class="stat">
        <span>⭐</span>
        <div>
          <small>Points</small>
          <h3>1250</h3>
        </div>
      </div>

      <div class="stat">
        <span>🏆</span>
        <div>
          <small>Rank</small>
          <h3>12</h3>
        </div>
      </div>
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <ng-container *ngIf="!result && currentQuestion">
      <p class="progress">Question {{ currentIndex + 1 }} of {{ questions.length }}</p>

      <div class="progress-bar-track">
        <div class="progress-bar-fill" [style.width.%]="((currentIndex) / questions.length) * 100"></div>
      </div>

      <h2>{{ currentQuestion.question_text }}</h2>

      <div class="options">
        <button
          *ngFor="let opt of ['a','b','c','d']"
          [class.selected]="selectedOption === opt"
          [attr.data-letter]="opt.toUpperCase()"
          (click)="selectOption(opt)"
        >
          {{ currentQuestion['option_' + opt] }}
        </button>
      </div>

      <button
        class="submit-btn"
        [disabled]="!selectedOption || submitting"
        (click)="submitAnswer()"
      >
        {{ submitting ? 'Submitting…' : (currentIndex === questions.length - 1 ? 'Finish quiz' : 'Next question') }}
      </button>
    </ng-container>

    <div class="result" *ngIf="result">
      <img class="fan-icon-result" src="assets/img/turbine-fan-icon.png" alt="" />
      <h2>Quiz complete</h2>
      <p>You earned <strong>{{ result.score_earned }} points</strong> on this section.</p>
      <p>Total score: <strong>{{ result.total_score }}</strong></p>
      <p class="redirecting">Returning to login screen…</p>
    </div>
    
  </div>
</div>
