<app-brand-header></app-brand-header>

<div class="resume-container">


  <div class="resume-card">
    <p class="eyebrow">Welcome back</p>
    <h1>Continue your session</h1>
    <p class="subtitle">Scan your badge, or enter your ID number to pick up where you left off.</p>

    <div class="scanner-section" *ngIf="scannerActive">
      <div id="qr-reader"></div>
      <p class="scanner-hint" *ngIf="scannerStarting">Starting camera…</p>
      <button class="btn-secondary" (click)="stopScanner()">Cancel scan</button>
    </div>

    <div class="form-section" *ngIf="!scannerActive">
      <button class="btn-primary" (click)="startScanner()">📷 Scan Badge</button>
      <div class="divider"><span>or</span></div>
      <input [(ngModel)]="userId" placeholder="ID number or QR code" autocomplete="off" (keyup.enter)="resume()" />
      <button class="btn-secondary" (click)="resume()">Continue →</button>
    </div>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="switch-link">First time here? <a (click)="goToRegister()">Sign up</a></p>
    <button class="btn-secondary" (click)="openItinerary()">View workshop schedule</button>
</div>

<app-itinerary-modal [open]="showItinerary" (closed)="closeItinerary()"></app-itinerary-modal>
