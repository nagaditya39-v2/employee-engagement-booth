<div class="content-container">
	<!-- ================= POPUP ================= -->

	<div class="overlay" *ngIf="showTopicPopup">
		<div class="topic-popup">
			<h2>Select a Topic</h2>

			<p>Please choose a topic before continuing.</p>

			<div class="topic-list">
				<button *ngFor="let topic of topics" class="popup-topic" [class.selected]="selectedTopicId === topic.id"
					(click)="selectTopic(topic.id)">
					{{ topic.title }}
				</button>
			</div>

			<button class="continue-btn" [disabled]="selectedTopicId === null" (click)="startLearning()">
				Start Learning
			</button>
		</div>
	</div>

	<!-- ================= PAGE ================= -->

	<div class="page-content" [class.disabled]="showTopicPopup">
		<!-- Header -->

		<button class="back-btn" (click)="backButton()">← Back To Resume Session</button>

		<div class="header">
			<div>
				<h1>1. TEACH ME IN 60 SECONDS</h1>
				<p>Select a topic and watch a 60-second video</p>
			</div>

			<div class="stats">
				<div class="stat">
					<span>⭐</span>
					<div>
						<small>Points</small>
						<h3>1250</h3>
					</div>
				</div>

				<div class="stat">
					<span>🏆</span>
					<div>
						<small>Rank</small>
						<h3>12</h3>
					</div>
				</div>
			</div>
		</div>

		<!-- Body -->

		<div class="content-body">
			<!-- Sidebar -->

			<aside class="sidebar">
				<div class="sidebar-title">TEACH ME IN 60 SECONDS</div>

				<button *ngFor="let topic of topics" class="topic" [class.active]="topic.id === activeTopicId" [class.inActive]="topic.id !== activeTopicId">
					{{ topic.title }}
				</button>
			</aside>

			<!-- Main -->

			<section class="main">
				<div class="video-card">
					<div class="video-header">
						<div>
							<small>NOW PLAYING</small>
							<h2>{{ selectedTitle || 'Select a topic' }}</h2>
						</div>

						<div class="timer">
							<span>60</span>
							<small>SECONDS</small>
						</div>
					</div>

					<div class="video-placeholder">
						<video controls>
							<source [src]="selectedVideoUrl" type="video/mp4">
						</video>
					</div>
				</div>
			</section>
		</div>
	</div>
</div>
